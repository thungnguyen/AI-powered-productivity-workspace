version: '3.8'

services:
  zennote_mysql:
    image: mysql:8.0
    container_name: zennote_mysql
    restart: always
    environment:
      MYSQL_DATABASE: zennote_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - zennote_mysql_data:/var/lib/mysql
    networks:
      - zennote_network

  zennote_redis:
    image: redis:7.0-alpine
    container_name: zennote_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - zennote_redis_data:/data
    networks:
      - zennote_network

  zennote_api:
    image: zennote_api:latest
    container_name: zennote_api
    build:
      context: ../backend
      dockerfile: src/ZenNote.Api/Dockerfile
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=zennote_mysql;Port=3306;Database=zennote_db;User=root;Password=root_password;
      - RedisSettings__ConnectionString=zennote_redis:6379
    depends_on:
      - zennote_mysql
      - zennote_redis
    networks:
      - zennote_network

volumes:
  zennote_mysql_data:
  zennote_redis_data:

networks:
  zennote_network:
    driver: bridge
